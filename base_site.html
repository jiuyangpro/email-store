{% extends "admin/base.html" %}
{% load static %}

{% block extrahead %}
{{ block.super }}
<meta name="theme-color" content="#165DFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="企业邮箱管理后台">
<meta name="mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="manifest" href="{% static 'admin/admin.webmanifest' %}">
<link rel="apple-touch-icon" href="{% static 'admin/admin-icon-180.png' %}">
<link rel="icon" type="image/png" sizes="180x180" href="{% static 'admin/admin-icon-180.png' %}">
<link rel="stylesheet" href="{% static 'admin/mobile-admin.css' %}">
<!-- 引入 Font Awesome 图标 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
    /* 全局样式 */
    :root {
        --primary-color: #165DFF;
        --primary-light: #4080FF;
        --primary-dark: #0E42C2;
        --secondary-color: #36CFC9;
        --success-color: #52C41A;
        --warning-color: #FAAD14;
        --error-color: #F5222D;
        --text-color: #1D2129;
        --text-light: #4E5969;
        --text-lighter: #86909C;
        --bg-color: #F2F3F5;
        --card-bg: #FFFFFF;
        --border-color: #E5E6EB;
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
        --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.12);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.16);
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --radius-xl: 16px;
        --transition: all 0.3s ease;
    }

    /* 头部样式 */
    #header {
        background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
        color: #FFFFFF;
        box-shadow: var(--shadow-md);
        position: relative;
        overflow: hidden;
    }

    #header::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        z-index: 0;
    }

    #header > * {
        position: relative;
        z-index: 1;
    }

    #branding h1, #branding h1 a:link, #branding h1 a:visited {
        color: #FFFFFF;
        font-size: 24px;
        font-weight: 700;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    #user-tools {
        font-size: 14px;
        font-weight: 500;
    }

    #user-tools a {
        color: rgba(255, 255, 255, 0.9);
        text-decoration: none;
        transition: var(--transition);
    }

    #user-tools a:hover {
        color: #FFFFFF;
        text-decoration: underline;
    }

    /* 侧边栏样式 */
    #nav-sidebar {
        background-color: var(--card-bg);
        border-right: 1px solid var(--border-color);
        box-shadow: var(--shadow-sm);
    }

    #nav-sidebar .current-model {
        background-color: rgba(22, 93, 255, 0.1);
        border-left: 4px solid var(--primary-color);
    }

    #nav-sidebar a {
        color: var(--text-color);
        transition: var(--transition);
    }

    #nav-sidebar a:hover {
        color: var(--primary-color);
        background-color: rgba(22, 93, 255, 0.05);
    }

    /* 内容区域样式 */
    .dashboard {
        padding: 24px;
        background-color: var(--bg-color);
        min-height: calc(100vh - 60px);
    }

    /* 卡片样式 */
    .admin-dashboard {
        display: grid;
        gap: 24px;
        padding-top: 8px;
    }

    .dashboard-hero {
        background: var(--card-bg);
        border-radius: var(--radius-xl);
        padding: 32px;
        box-shadow: var(--shadow-md);
        border: 1px solid var(--border-color);
        position: relative;
        overflow: hidden;
    }

    .dashboard-hero::before {
        content: '';
        position: absolute;
        top: 0;
        right: 0;
        width: 200px;
        height: 200px;
        background: linear-gradient(135deg, var(--primary-light), var(--secondary-color));
        border-radius: 50%;
        transform: translate(50%, -50%);
        opacity: 0.1;
    }

    .dashboard-hero h1 {
        margin: 0 0 12px;
        font-size: 32px;
        font-weight: 700;
        color: var(--text-color);
    }

    .dashboard-hero p {
        margin: 0;
        color: var(--text-light);
        font-size: 16px;
        line-height: 1.6;
    }

    .dashboard-notice {
        margin-top: 16px;
        padding: 16px;
        border-radius: var(--radius-lg);
        background: rgba(82, 196, 26, 0.1);
        color: var(--success-color);
        border: 1px solid rgba(82, 196, 26, 0.3);
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .dashboard-notice i {
        font-size: 20px;
    }

    /* 统计卡片样式 */
    .dashboard-summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
    }

    .summary-card {
        background: var(--card-bg);
        border-radius: var(--radius-xl);
        padding: 24px;
        box-shadow: var(--shadow-md);
        border: 1px solid var(--border-color);
        transition: var(--transition);
        position: relative;
        overflow: hidden;
    }

    .summary-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-lg);
    }

    .summary-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 4px;
        height: 100%;
        background: linear-gradient(to bottom, var(--primary-color), var(--secondary-color));
    }

    .summary-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 16px;
    }

    .summary-icon {
        width: 48px;
        height: 48px;
        border-radius: var(--radius-lg);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        color: var(--primary-color);
        background: rgba(22, 93, 255, 0.1);
    }

    .summary-label {
        display: block;
        margin-bottom: 8px;
        color: var(--text-lighter);
        font-size: 14px;
        font-weight: 500;
    }

    .summary-value {
        display: block;
        font-size: 32px;
        font-weight: 700;
        line-height: 1.1;
        margin-bottom: 8px;
        color: var(--text-color);
    }

    .summary-change {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 14px;
        font-weight: 500;
    }

    .summary-change.positive {
        color: var(--success-color);
    }

    .summary-change.negative {
        color: var(--error-color);
    }

    /* 操作卡片样式 */
    .dashboard-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 20px;
    }

    .dashboard-card {
        display: block;
        background: var(--card-bg);
        border-radius: var(--radius-xl);
        padding: 28px;
        color: var(--text-color);
        text-decoration: none;
        box-shadow: var(--shadow-md);
        border: 1px solid var(--border-color);
        transition: var(--transition);
        position: relative;
        overflow: hidden;
    }

    .dashboard-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-lg);
        border-color: var(--primary-light);
    }

    .dashboard-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
    }

    .dashboard-card h2 {
        margin: 0 0 12px;
        font-size: 20px;
        font-weight: 600;
        color: var(--text-color);
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .dashboard-card h2 i {
        font-size: 24px;
        color: var(--primary-color);
    }

    .dashboard-card p {
        margin: 0;
        color: var(--text-light);
        line-height: 1.6;
        font-size: 14px;
    }

    .dashboard-card .card-footer {
        margin-top: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .dashboard-card .card-footer span {
        font-size: 13px;
        color: var(--text-lighter);
    }

    .dashboard-card .card-footer i {
        font-size: 16px;
        color: var(--primary-light);
    }

    /* 按钮样式 */
    .button-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 20px;
        border-radius: var(--radius-lg);
        background: var(--primary-color);
        color: #FFFFFF;
        text-decoration: none;
        font-weight: 600;
        transition: var(--transition);
        border: none;
        cursor: pointer;
        gap: 8px;
    }

    .button-link:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
    }

    .button-link.secondary {
        background: var(--card-bg);
        color: var(--primary-color);
        border: 1px solid var(--primary-color);
    }

    .button-link.secondary:hover {
        background: rgba(22, 93, 255, 0.05);
    }

    /* 表格样式 */
    .module table {
        border-collapse: collapse;
        width: 100%;
        background: var(--card-bg);
        border-radius: var(--radius-lg);
        overflow: hidden;
        box-shadow: var(--shadow-sm);
    }

    .module table th {
        background: var(--primary-color);
        color: #FFFFFF;
        padding: 12px 16px;
        text-align: left;
        font-weight: 600;
    }

    .module table td {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border-color);
    }

    .module table tr:hover {
        background: rgba(22, 93, 255, 0.05);
    }

    /* 表单样式 */
    .form-row {
        margin-bottom: 16px;
    }

    .form-row label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: var(--text-color);
    }

    .form-row input,
    .form-row select,
    .form-row textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        font-size: 14px;
        transition: var(--transition);
    }

    .form-row input:focus,
    .form-row select:focus,
    .form-row textarea:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(22, 93, 255, 0.1);
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
        .dashboard-summary-grid,
        .dashboard-grid {
            grid-template-columns: 1fr;
        }

        .dashboard-hero {
            padding: 24px;
        }

        .dashboard-hero h1 {
            font-size: 24px;
        }

        .summary-value {
            font-size: 24px;
        }

        .dashboard {
            padding: 16px;
        }
    }

    /* 动画效果 */
    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .dashboard-hero,
    .summary-card,
    .dashboard-card {
        animation: fadeIn 0.5s ease-out forwards;
    }

    .dashboard-hero {
        animation-delay: 0.1s;
    }

    .summary-card:nth-child(1) {
        animation-delay: 0.2s;
    }

    .summary-card:nth-child(2) {
        animation-delay: 0.3s;
    }

    .summary-card:nth-child(3) {
        animation-delay: 0.4s;
    }

    .dashboard-card:nth-child(1) {
        animation-delay: 0.5s;
    }

    .dashboard-card:nth-child(2) {
        animation-delay: 0.6s;
    }
</style>
{% endblock %}
