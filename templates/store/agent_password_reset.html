{% extends "base.html" %}
{% load static %}

{% block title %}邮箱找回密码 - 企业邮箱商城{% endblock %}
{% block meta_robots %}noindex,nofollow,noarchive{% endblock %}

{% block content %}
<section class="card order-card">
    <h1>邮箱找回代理密码</h1>
    <p class="muted">请输入你已经绑定并验证过的邮箱，先接收验证码，再设置新的代理后台密码。</p>
    <form method="post" class="order-form">
        {% csrf_token %}
        <label for="email">绑定邮箱</label>
        <input id="email" name="email" type="email" placeholder="输入你绑定过的邮箱" required>

        <label for="email_code">邮箱验证码</label>
        <div class="inline-field-row">
            <input id="email_code" name="email_code" type="text" inputmode="numeric" placeholder="输入邮箱验证码" required>
            <button
                class="button secondary send-email-code-btn"
                type="button"
                data-purpose="reset"
                data-email-field="email"
                data-status-id="agent-reset-email-status"
                data-send-url="{% url 'agent_send_email_code' %}"
            >发送验证码</button>
        </div>
        <p id="agent-reset-email-status" class="muted"></p>
        <p class="muted">如果收件箱没看到验证码，请顺手检查一下垃圾邮箱。</p>

        <label for="new_password">新密码</label>
        <input id="new_password" name="new_password" type="password" minlength="6" required>

        <label for="confirm_password">确认新密码</label>
        <input id="confirm_password" name="confirm_password" type="password" minlength="6" required>

        <button class="button" type="submit">重置密码</button>
    </form>
    <div class="actions">
        <a class="button secondary" href="{% url 'agent_login' %}">返回代理登录</a>
    </div>
</section>
<script src="{% static 'store/email-code-helper.js' %}"></script>
{% endblock %}
