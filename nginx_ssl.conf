server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.ceshi88888.asia;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.ceshi88888.asia;

    ssl_certificate /etc/letsencrypt/live/www.ceshi88888.asia/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.ceshi88888.asia/privkey.pem;

    client_max_body_size 100m;

    location /static/ {
        alias /var/www/docstore/staticfiles/;
    }

    location /media/ {
        alias /var/www/docstore/media/;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
